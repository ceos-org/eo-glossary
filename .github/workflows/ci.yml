name: ci
on:
  push:
    branches:
      - main
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # needed for git history (last-modified dates)

      # ── Configure Git ────────────────────────────────────────────────────────
      - name: Configure Git credentials
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      # ── Python via uv ────────────────────────────────────────────────────────
      # Scripts declare inline dependencies (PEP 723), so uv resolves them
      # automatically — no separate pip install step needed.
      - uses: astral-sh/setup-uv@v5

      - name: Generate glossary exports (XLSX, Parquet, JSON)
        run: uv run scripts/export_glossary.py

      - name: Generate Sigma.js graph data
        run: uv run scripts/generate_sigma_graph_data.py

      - name: Commit exports and graph data back to main
        run: |
          git add -f exports/ static/graph/data.json || true
          git diff --cached --quiet || git commit -m "chore: update glossary exports"
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Node.js / Docusaurus ─────────────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci

      - name: Build Docusaurus site
        run: npm run build
        env:
          NODE_OPTIONS: '--max_old_space_size=4096'

      # ── Deploy to GitHub Pages ───────────────────────────────────────────────
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build
          cname: ''   # set to your custom domain if needed
